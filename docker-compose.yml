services:
  yield-api:
    image: ghcr.io/magicyangyangfan/deepalloy_precipitate:latest
    container_name: kawin-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    mem_limit: 2g
    cpus: 0.8
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
